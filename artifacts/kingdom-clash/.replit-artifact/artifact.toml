kind = "web"
previewPath = "/"
title = "Kingdom Clash"
version = "1.0.0"
id = "artifacts/kingdom-clash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20625

[services.development]
run = "pnpm --filter @workspace/kingdom-clash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kingdom-clash", "run", "build" ]
publicDir = "artifacts/kingdom-clash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20625"
BASE_PATH = "/"
